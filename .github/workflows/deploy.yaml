name: Deploy and Train

# ── Triggers ──────────────────────────────────────────────────────────────────
# workflow_dispatch is the primary trigger — training runs cost money, so
# explicit manual invocation is the safest default.
#
# To enable automatic runs on push to main, uncomment the `push` block below.
# Push-triggered runs will deploy the stack AND launch all training jobs.

on:
  workflow_dispatch:
    inputs:
      global_base_model:
        description: "HuggingFace base model (overrides env default for this run)"
        required: false
        default: "Qwen/Qwen2.5-0.5B-Instruct"
      local_base_model:
        description: "Local/private base model override (empty = use global)"
        required: false
        default: ""
      skip_training:
        description: "Set to 'true' to deploy infrastructure only, skip training"
        required: false
        default: "false"

  # push:
  #   branches: [main]
  #   paths:
  #     - "template.yaml"
  #     - "src/**"

# ── Permissions ───────────────────────────────────────────────────────────────
# id-token: write is required for OIDC-based AWS credential exchange.
permissions:
  id-token: write
  contents: read

# ── Global env vars ───────────────────────────────────────────────────────────
env:
  AWS_REGION: us-east-1
  SAM_STACK_NAME: trainweave
  ASSUME_ROLE_ARN: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer

  # Model configuration — override at dispatch time or via repository variables
  GLOBAL_BASE_MODEL: ${{ inputs.global_base_model || vars.GLOBAL_BASE_MODEL || 'Qwen/Qwen2.5-0.5B-Instruct' }}
  LOCAL_BASE_MODEL: ${{ inputs.local_base_model || vars.LOCAL_BASE_MODEL || '' }}

  # SubnetId and SecurityGroup default to shared stack outputs; S3 buckets created by stack.
  # TRAINING_AMI_ID is resolved automatically at deploy time — no secret required.

jobs:
  deploy-and-train:
    name: Deploy stack and launch training runs
    runs-on: ubuntu-latest
    timeout-minutes: 30  # deploy + 3 async invokes should complete well under 30m

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS credentials (OIDC) ───────────────────────────────────────────────
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ASSUME_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── SAM CLI ───────────────────────────────────────────────────────────────
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # ── Resolve VPC and subnet from shared stack ──────────────────────────────
      # Uses describe-stacks (works for any output, exported or not) to read
      # LambdaSubnetAz1Id, then derives VpcId via describe-subnets.
      - name: Resolve VPC and subnet from shared stack
        id: resolve-vpc
        run: |
          SUBNET_ID=$(aws cloudformation describe-stacks \
            --stack-name tarun-teamweave-shared \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaSubnetAz1Id'].OutputValue" \
            --output text)
          VPC_ID=$(aws ec2 describe-subnets \
            --region "$AWS_REGION" \
            --subnet-ids "$SUBNET_ID" \
            --query "Subnets[0].VpcId" \
            --output text)
          echo "subnet_id=$SUBNET_ID" >> "$GITHUB_OUTPUT"
          echo "vpc_id=$VPC_ID" >> "$GITHUB_OUTPUT"
          echo "Subnet: $SUBNET_ID  VPC: $VPC_ID"

      # ── Resolve Deep Learning AMI ─────────────────────────────────────────────
      # Try known AWS naming patterns in order of preference; fall back to listing
      # available names so the filter can be updated if AWS renames the series.
      - name: Resolve Deep Learning AMI
        id: resolve-ami
        run: |
          find_ami() {
            aws ec2 describe-images \
              --region "$AWS_REGION" \
              --owners amazon \
              --filters \
                "Name=name,Values=$1" \
                "Name=architecture,Values=x86_64" \
                "Name=state,Values=available" \
              --query "sort_by(Images,&CreationDate)[-1].ImageId" \
              --output text
          }

          for PATTERN in \
            "Deep Learning AMI GPU PyTorch*" \
            "AWS Deep Learning AMI*PyTorch*" \
            "Deep Learning OSS Nvidia Driver AMI*PyTorch*" \
            "*Deep*Learning*PyTorch*x86_64*"; do
            AMI_ID=$(find_ami "$PATTERN")
            if [ -n "$AMI_ID" ] && [ "$AMI_ID" != "None" ]; then
              AMI_NAME=$(aws ec2 describe-images --region "$AWS_REGION" \
                --image-ids "$AMI_ID" --query "Images[0].Name" --output text)
              echo "Resolved Deep Learning AMI: $AMI_ID ($AMI_NAME)"
              break
            fi
          done

          if [ -z "$AMI_ID" ] || [ "$AMI_ID" = "None" ]; then
            echo "ERROR: No Deep Learning PyTorch AMI found. Available Deep Learning AMIs in $AWS_REGION:" >&2
            aws ec2 describe-images \
              --region "$AWS_REGION" \
              --owners amazon \
              --filters \
                "Name=name,Values=*Deep*Learning*" \
                "Name=architecture,Values=x86_64" \
                "Name=state,Values=available" \
              --query "sort_by(Images,&CreationDate)[-5:].Name" \
              --output text >&2
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved Deep Learning AMI: $AMI_ID"

      # ── SAM build ─────────────────────────────────────────────────────────────
      # Lambda uses only stdlib + boto3 (pre-installed in runtime), so build
      # is fast. No Docker needed — use --use-container only if adding native
      # dependencies to the Lambda.
      - name: Build SAM application
        run: sam build --use-container

      # ── SAM deploy ────────────────────────────────────────────────────────────
      # Idempotent: re-running deploy on an unchanged stack is a no-op.
      # --no-fail-on-empty-changeset prevents failures when nothing changed.
      # S3 buckets are created by the stack with DeletionPolicy: Retain.
      # SubnetId defaults to tarun-teamweave-shared:LambdaSubnetAz1Id if not overridden.
      - name: Deploy SAM stack
        run: |
          sam deploy \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              GlobalBaseModel="$GLOBAL_BASE_MODEL" \
              LocalBaseModel="$LOCAL_BASE_MODEL" \
              SubnetId="${{ steps.resolve-vpc.outputs.subnet_id }}" \
              VpcId="${{ steps.resolve-vpc.outputs.vpc_id }}" \
              TrainingAmiId="${{ steps.resolve-ami.outputs.ami_id }}"

      # ── Get stack outputs ─────────────────────────────────────────────────────
      - name: Get stack outputs
        id: stack-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs" \
            --output json)

          FUNCTION_NAME=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="OrchestratorFunctionName") | .OutputValue')
          ARTIFACTS_BUCKET=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="TrainingArtifactsBucketName") | .OutputValue')
          CODE_BUCKET=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="TrainingCodeBucketName") | .OutputValue')

          echo "function_name=$FUNCTION_NAME" >> "$GITHUB_OUTPUT"
          echo "artifacts_bucket=$ARTIFACTS_BUCKET" >> "$GITHUB_OUTPUT"
          echo "code_bucket=$CODE_BUCKET" >> "$GITHUB_OUTPUT"

          echo "Orchestrator function: $FUNCTION_NAME"
          echo "Artifacts bucket: $ARTIFACTS_BUCKET"
          echo "Code bucket: $CODE_BUCKET"

      # ── Upload training code to S3 ────────────────────────────────────────────
      # bootstrap.sh and train.py live in the code bucket so the EC2 instance
      # can pull them at runtime without baking them into an AMI.
      # Re-uploading on every deploy is cheap and ensures code stays in sync.
      - name: Upload training code to S3
        run: |
          CODE_BUCKET="${{ steps.stack-outputs.outputs.code_bucket }}"
          aws s3 sync src/training/ \
            "s3://$CODE_BUCKET/training/" \
            --delete \
            --region "$AWS_REGION"
          echo "Training code uploaded to s3://$CODE_BUCKET/training/"

      # ── Upload training datasets to S3 ───────────────────────────────────────
      # Datasets live in data/ in the repo and are synced to the code bucket
      # under datasets/. EC2 instances download them via the S3 VPC endpoint.
      - name: Upload training datasets to S3
        run: |
          CODE_BUCKET="${{ steps.stack-outputs.outputs.code_bucket }}"
          aws s3 sync data/ \
            "s3://$CODE_BUCKET/datasets/" \
            --delete \
            --region "$AWS_REGION"
          echo "Training datasets uploaded to s3://$CODE_BUCKET/datasets/"

      # ── Training runs ─────────────────────────────────────────────────────────
      # Each step invokes the Lambda asynchronously (--invocation-type Event).
      # GitHub Actions does NOT wait for training to complete — instances
      # self-terminate when done. Check S3 for adapter outputs.
      #
      # To add a new dataset: add a JSONL file under data/<name>/train.jsonl,
      # copy one of these steps, and update dataset_name / dataset_key.

      - name: Train — dataset-a (customer support)
        if: ${{ inputs.skip_training != 'true' }}
        env:
          FUNCTION_NAME: ${{ steps.stack-outputs.outputs.function_name }}
          CODE_BUCKET: ${{ steps.stack-outputs.outputs.code_bucket }}
        run: |
          JOB_ID="trainweave-dataset-a-$(date -u +%Y%m%d-%H%M%S)"
          PAYLOAD=$(jq -n \
            --arg job_id "$JOB_ID" \
            --arg dataset_name "customer-support" \
            --arg dataset_bucket "$CODE_BUCKET" \
            --arg dataset_key "datasets/customer-support/train.jsonl" \
            '{job_id: $job_id, dataset_name: $dataset_name, dataset_bucket: $dataset_bucket, dataset_key: $dataset_key}')

          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --invocation-type Event \
            --cli-binary-format raw-in-base64-out \
            --payload "$PAYLOAD" \
            --region "$AWS_REGION" \
            /dev/null

          echo "Launched training job: $JOB_ID"
          echo "Adapter will be uploaded to: s3://${{ steps.stack-outputs.outputs.artifacts_bucket }}/adapters/$JOB_ID/"

      - name: Train — dataset-b (API JSON)
        if: ${{ inputs.skip_training != 'true' }}
        env:
          FUNCTION_NAME: ${{ steps.stack-outputs.outputs.function_name }}
          CODE_BUCKET: ${{ steps.stack-outputs.outputs.code_bucket }}
        run: |
          JOB_ID="trainweave-dataset-b-$(date -u +%Y%m%d-%H%M%S)"
          PAYLOAD=$(jq -n \
            --arg job_id "$JOB_ID" \
            --arg dataset_name "api-json" \
            --arg dataset_bucket "$CODE_BUCKET" \
            --arg dataset_key "datasets/api-json/train.jsonl" \
            '{job_id: $job_id, dataset_name: $dataset_name, dataset_bucket: $dataset_bucket, dataset_key: $dataset_key}')

          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --invocation-type Event \
            --cli-binary-format raw-in-base64-out \
            --payload "$PAYLOAD" \
            --region "$AWS_REGION" \
            /dev/null

          echo "Launched training job: $JOB_ID"
          echo "Adapter will be uploaded to: s3://${{ steps.stack-outputs.outputs.artifacts_bucket }}/adapters/$JOB_ID/"

      - name: Train — dataset-c (tool calling)
        if: ${{ inputs.skip_training != 'true' }}
        env:
          FUNCTION_NAME: ${{ steps.stack-outputs.outputs.function_name }}
          CODE_BUCKET: ${{ steps.stack-outputs.outputs.code_bucket }}
        run: |
          JOB_ID="trainweave-dataset-c-$(date -u +%Y%m%d-%H%M%S)"
          PAYLOAD=$(jq -n \
            --arg job_id "$JOB_ID" \
            --arg dataset_name "tool-calling" \
            --arg dataset_bucket "$CODE_BUCKET" \
            --arg dataset_key "datasets/tool-calling/train.jsonl" \
            '{job_id: $job_id, dataset_name: $dataset_name, dataset_bucket: $dataset_bucket, dataset_key: $dataset_key}')

          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --invocation-type Event \
            --cli-binary-format raw-in-base64-out \
            --payload "$PAYLOAD" \
            --region "$AWS_REGION" \
            /dev/null

          echo "Launched training job: $JOB_ID"
          echo "Adapter will be uploaded to: s3://${{ steps.stack-outputs.outputs.artifacts_bucket }}/adapters/$JOB_ID/"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Print summary
        if: ${{ inputs.skip_training != 'true' }}
        run: |
          echo "## TrainWeave — Training Jobs Launched" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All 3 training jobs launched asynchronously." >> "$GITHUB_STEP_SUMMARY"
          echo "EC2 Spot instances will self-terminate when training completes." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Monitor progress:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- EC2 console → filter by tag \`trainweave:project=trainweave\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- S3: \`s3://${{ steps.stack-outputs.outputs.artifacts_bucket }}/adapters/\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- CloudWatch Logs: \`/aws/lambda/trainweave-orchestrator\`" >> "$GITHUB_STEP_SUMMARY"
